<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background-color: var(--bg-secondary);">
  <div class="card shadow-sm p-4" style="width:100%;max-width:440px;background-color:var(--card-bg);border-color:var(--border-color);">
    <h3 class="text-center mb-4" style="color:var(--text-primary);">Create Account</h3>

    @if (success()) {
      <div class="alert alert-success text-center">
        ✅ Registration successful! Please check your email to verify your account.
      </div>
    } @else {
      @if (error()) {
        <div class="alert alert-danger">{{ error() }}</div>
      }
      <form (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label" style="color:var(--text-primary);">Username</label>
          <input type="text" class="form-control" [(ngModel)]="username" name="username" required
                 style="background-color:var(--bg-secondary);color:var(--text-primary);border-color:var(--border-color);" />
        </div>
        <div class="mb-3">
          <label class="form-label" style="color:var(--text-primary);">Email</label>
          <input type="email" class="form-control" [(ngModel)]="email" name="email" required
                 style="background-color:var(--bg-secondary);color:var(--text-primary);border-color:var(--border-color);" />
        </div>
        <div class="mb-3">
          <label class="form-label" style="color:var(--text-primary);">Password</label>
          <input type="password" class="form-control" [(ngModel)]="password" name="password" required
                 style="background-color:var(--bg-secondary);color:var(--text-primary);border-color:var(--border-color);" />
        </div>
        <div class="mb-3">
          <label class="form-label" style="color:var(--text-primary);">Confirm Password</label>
          <input type="password" class="form-control" [(ngModel)]="confirmPassword" name="confirmPassword" required
                 style="background-color:var(--bg-secondary);color:var(--text-primary);border-color:var(--border-color);" />
        </div>
        <button class="btn btn-primary w-100" type="submit" [disabled]="loading()">
          {{ loading() ? 'Registering...' : 'Register' }}
        </button>
      </form>
      <p class="text-center mt-3 small" style="color:var(--text-secondary);">
        Already have an account? <a routerLink="/login" style="color:var(--accent);">Login</a>
      </p>
    }
  </div>
</div>
