<nav class="navbar">
  <div class="navbar__left">
    <button class="navbar__theme-btn" (click)="toggleDarkMode()" [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
      @if (isDarkMode()) {
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>
  </div>

  <div class="navbar__links">
    <a class="navbar__link" routerLink="/dashboard" routerLinkActive="navbar__link--active">Dashboard</a>
    <a class="navbar__link" routerLink="/admin" routerLinkActive="navbar__link--active">Admin</a>
  </div>

  <div class="navbar__avatar-wrapper">
    <button
      class="navbar__avatar-btn"
      (click)="toggleDropdown($event)"
      [attr.aria-expanded]="isOpen()"
      aria-haspopup="true"
    >
      <span class="navbar__avatar">U</span>
      <svg
        class="navbar__chevron"
        [class.navbar__chevron--open]="isOpen()"
        xmlns="http://www.w3.org/2000/svg"
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>

    @if (isOpen()) {
      <div class="navbar__dropdown" role="menu" (click)="$event.stopPropagation()">
        <a class="navbar__dropdown-item" routerLink="/profile" role="menuitem">Profile</a>
        <a class="navbar__dropdown-item" routerLink="/settings" role="menuitem">Settings</a>
        <hr class="navbar__dropdown-divider" />
        <button class="navbar__dropdown-item navbar__dropdown-item--danger" role="menuitem">Sign out</button>
      </div>
    }
  </div>
</nav>
