<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-semibold mb-0" style="color:var(--text-primary);">My Articles</h2>
    <a routerLink="/dashboard/articles/new" class="btn btn-primary">✏️ New Article</a>
  </div>

  <div class="table-responsive">
    <table class="table" style="color:var(--text-primary);">
      <thead style="border-color:var(--border-color);">
        <tr>
          <th>Cover</th><th>Title</th><th>Status</th><th>Views</th><th>Likes</th><th>Date</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (a of articles(); track a.id) {
          <tr style="border-color:var(--border-color);">
            <td><img [src]="a.coverImageUrl || 'https://placehold.co/60x40'" width="60" height="40" style="object-fit:cover;border-radius:4px;" /></td>
            <td>{{ a.title }}</td>
            <td>
              <span class="badge" [style.background-color]="a.status === 'PUBLISHED' ? '#198754' : '#6c757d'">
                {{ a.status }}
              </span>
            </td>
            <td>{{ a.viewCount }}</td>
            <td>{{ a.likeCount }}</td>
            <td>{{ a.createdAt | date:'mediumDate' }}</td>
            <td>
              <div class="d-flex gap-1">
                <a [routerLink]="['/dashboard/articles', a.id, 'edit']" class="btn btn-sm btn-outline-primary">✏️</a>
                @if (a.status === 'DRAFT') {
                  <button class="btn btn-sm btn-outline-success" (click)="publish(a.id)">✔</button>
                }
                <button class="btn btn-sm btn-outline-danger" (click)="confirmDelete(a.id)">🗑</button>
              </div>
            </td>
          </tr>
        }
        @empty {
          <tr><td colspan="7" class="text-center" style="color:var(--text-secondary);">No articles yet.</td></tr>
        }
      </tbody>
    </table>
  </div>
</div>

<app-confirm-dialog
  message="Are you sure you want to delete this article?"
  [visible]="confirmVisible"
  (confirmed)="onConfirmed($event)" />
