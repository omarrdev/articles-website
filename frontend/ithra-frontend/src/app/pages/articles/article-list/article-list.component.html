<div class="container py-4">
  <h2 class="mb-4 fw-semibold" style="color:var(--text-primary);">Articles</h2>

  <!-- Filter bar -->
  <div class="row g-2 mb-4">
    <div class="col-md-5">
      <input type="text" class="form-control" placeholder="Search articles..." [(ngModel)]="search" (input)="onSearch()"
             style="background-color:var(--bg-secondary);color:var(--text-primary);border-color:var(--border-color);" />
    </div>
    <div class="col-md-3">
      <select class="form-select" [(ngModel)]="categorySlug" (change)="onSearch()"
              style="background-color:var(--bg-secondary);color:var(--text-primary);border-color:var(--border-color);">
        <option value="">All Categories</option>
        @for (cat of categories(); track cat.id) {
          <option [value]="cat.slug">{{ cat.name }}</option>
        }
      </select>
    </div>
    <div class="col-md-3">
      <select class="form-select" [(ngModel)]="sort" (change)="onSearch()"
              style="background-color:var(--bg-secondary);color:var(--text-primary);border-color:var(--border-color);">
        <option value="createdAt,desc">Latest</option>
        <option value="viewCount,desc">Most Viewed</option>
        <option value="likeCount,desc">Most Liked</option>
      </select>
    </div>
  </div>

  <!-- Grid -->
  <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4 mb-4">
    @for (article of articles(); track article.id) {
      <div class="col"><app-article-card [article]="article" /></div>
    }
    @empty {
      <div class="col-12"><p style="color:var(--text-secondary);">No articles found.</p></div>
    }
  </div>

  <app-pagination [currentPage]="currentPage()" [totalPages]="totalPages()" (pageChange)="onPage($event)" />
</div>
