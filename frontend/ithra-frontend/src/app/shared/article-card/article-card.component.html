<div class="card h-100 article-card" [routerLink]="['/articles', article.slug]" style="cursor:pointer; background-color: var(--card-bg); border-color: var(--border-color);">
  <img
    [src]="article.coverImageUrl || 'https://placehold.co/400x200?text=No+Image'"
    class="card-img-top"
    [alt]="article.title"
    loading="lazy"
    style="height: 200px; object-fit: cover;"
  />
  <div class="card-body d-flex flex-column">
    <div class="mb-2">
      <span class="badge" style="background-color: var(--accent);">{{ article.category?.name }}</span>
    </div>
    <h5 class="card-title text-truncate-2" style="color: var(--text-primary);">{{ article.title }}</h5>
    <p class="card-text small text-truncate-3" style="color: var(--text-secondary);">{{ article.summary }}</p>

    <div class="mt-auto d-flex align-items-center gap-2">
      <span class="avatar-sm">{{ initials }}</span>
      <span class="small" style="color: var(--text-secondary);">{{ article.author?.username }}</span>
      <span class="small ms-auto" style="color: var(--text-secondary);">
        {{ article.publishedAt | date:'mediumDate' }}
      </span>
    </div>

    <div class="d-flex gap-3 mt-2 small" style="color: var(--text-secondary);">
      <span>❤️ {{ article.likeCount }}</span>
      <span>👁 {{ article.viewCount }}</span>
    </div>
  </div>
</div>
