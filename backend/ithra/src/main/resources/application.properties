spring.application.name=ithra

server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/articles_db
spring.datasource.username=articles_db
spring.datasource.password=rIfEGFL5$
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# JWT
jwt.secret=your-256-bit-secret-key-here-must-be-at-least-32-chars
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# App
app.base-url=http://localhost:8080
app.frontend-url=http://localhost:4200
app.upload-dir=uploads/

# Springdoc / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
